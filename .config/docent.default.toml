#:schema ../schemas/docent.schema.json

# Filesystem scan (fmt): include/exclude apply to recursive directory walks,
# including orphan .zig files. Check/typeset use build.zig module roots instead.
[fmt]
# include = ["src/", "modules/"]
# exclude = ["vendor/"]
brace_style = "k&r"
indent_style = "space"
indent_width = 4
logical_blank_lines = true
single_line_braces = true
sort_imports = true
trailing_comma = true
auto_wrap = false
max_line_length = 100
grid_alignment = false

# Module-API scan (check): target selection from build.zig. Category scan_mode
# values are visibility inside the reachable graph (public vs all), not a
# filesystem orphan walk.
[check]
# bins = false
# tests = false
# deps = false
# exclude_targets = ["bench"]

[typeset]
# include_private = false
# bundle_std = false
# output = "docs.json"
# exclude_targets = []

[doc]
scan_mode = "public"
blank_doc_comment = "warn"
trailing_blank_doc_comment = "warn"
missing_doctest = "allow"
private_doctest = "warn"
doctest_naming_mismatch = "warn"

[doc.missing_doc_comment]
level = "warn"
check_parameters = false
check_errors = true

[doc.missing_summary_terminal_punctuation]
level = "warn"
scope = "summary"
accepted_marks = [".", "!", "?"]

[doc.invalid_leading_phrase]
level = "warn"
require_kind = false
require_article = false
require_backticks = false

[style]
scan_mode = "all"

[style.identifier_case]
level = "warn"
namespaces = "snake_case"
functions = "camelCase"
struct_file_case = "PascalCase"
types = "PascalCase"
constants = "snake_case"

[style.line_length_limit]
level = "allow"
max_length = 100

[complexity]
scan_mode = "all"

[complexity.cognitive_complexity]
level = "warn"
threshold = 15

[complexity.cyclomatic_complexity]
level = "allow"
threshold = 10

[size]
scan_mode = "all"

[size.max_function_parameters]
level = "allow"
threshold = 7
