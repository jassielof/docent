# yaml-language-server: $schema=https://json-schema.org/draft-07/schema#
$schema: "https://json-schema.org/draft-07/schema#"
$id: "https://jassielof.github.io/docent/schemas/docent.schema.json"
title: "Docent Configuration Schema"
description: >-
  Categorized configuration for docent.toml. Inline diagnostic suppressions are
  not TOML keys; they use // line-comment pragmas in source — see
  #/definitions/inline_suppression.
type: "object"
additionalProperties: false
properties:
  doc:
    type: "object"
    description: "Documentation comment validation rules."
    additionalProperties: false
    properties:
      scan_mode:
        $ref: "#/definitions/scan_mode"
        description: "Whether to enforce doc rules on public declarations only, or all declarations. Default: public."
        default: "public"
      missing_doc_comment:
        $ref: "#/definitions/rule_missing_doc_comment"
        description: "API items, module roots, and exposed source files should have doc comments."
      blank_doc_comment:
        $ref: "#/definitions/rule_simple"
        description: "Doc comments should contain useful text, not be blank or whitespace-only."
      trailing_blank_doc_comment:
        $ref: "#/definitions/rule_simple"
        description: "Doc comments should not end with trailing blank lines."
      missing_summary_terminal_punctuation:
        $ref: "#/definitions/rule_missing_summary_terminal_punctuation"
        description: "The first paragraph of a doc comment should end with terminal punctuation."
      missing_doctest:
        $ref: "#/definitions/rule_simple"
        description: "Functions may include runnable doc examples."
      private_doctest:
        $ref: "#/definitions/rule_simple"
        description: "Private declarations should not carry identifier-style doctests."
      doctest_naming_mismatch:
        $ref: "#/definitions/rule_simple"
        description: "Doctest names should match the declaration they document."
      invalid_leading_phrase:
        $ref: "#/definitions/rule_invalid_leading_phrase"
        description: "Doc comment summaries should begin with a phrase naming the documented identifier."
      redundant_doc_comment:
        $ref: "#/definitions/rule_simple"
        description: "Re-exports should not carry doc comments if the target is already documented."

  style:
    type: "object"
    description: "Naming conventions and file layout rules."
    additionalProperties: false
    properties:
      scan_mode:
        $ref: "#/definitions/scan_mode"
        description: "Whether to enforce style rules on all declarations or public only. Default: all."
        default: "all"
      identifier_case:
        $ref: "#/definitions/rule_identifier_case"
        description: "Identifiers should follow casing conventions."
      line_length_limit:
        $ref: "#/definitions/rule_line_length_limit"
        description: "Physical line columns must stay within length limits."

  fmt:
    type: "object"
    description: "Formatter options for docent fmt."
    additionalProperties: false
    properties:
      brace_style:
        type: "string"
        enum: ["k_r", "k&r", "allman"]
        default: "k_r"
        description: "Brace placement style. k_r (default) keeps opening braces on the same line; allman places them on a new line."
      single_line_braces:
        type: "boolean"
        default: true
        description: "Wrap single-line control-flow bodies in braces. Converts `if (x) return;` to a braced block."
      trailing_comma:
        type: "boolean"
        default: true
        description: "Add trailing commas to single-line lists with 3 or more items. On the next format pass, zig fmt expands them to one item per line."
      logical_blank_lines:
        type: "boolean"
        default: true
        description: >-
          Enforce logical blank line separation: one blank line after closing braces
          and flow terminators (return, continue, break), no blank lines immediately
          inside braces, and never two consecutive blank lines.
      sort_imports:
        type: "boolean"
        default: true
        description: >-
          Sort the leading top-level import block by const identifier, regrouped into
          std/builtin, dependencies, and local (relative paths and root) categories.
          Import aliases are placed beneath the import they derive from.
      indent_style:
        type: "string"
        enum: ["space", "tab"]
        default: "space"
        description: "Leading-whitespace character per indentation level. tab ignores indent_width -- each level becomes a single tab."
      indent_width:
        type: "integer"
        minimum: 1
        maximum: 16
        default: 4
        description: "Number of spaces per indentation level when indent_style is space. The Zig standard is 4."
      auto_wrap:
        type: "boolean"
        default: false
        description: >-
          Best-effort wrap of lines longer than max_line_length by expanding
          lists and call argument lists. Off by default (gofumpt also does not wrap).
      max_line_length:
        type: "integer"
        minimum: 1
        maximum: 10000
        default: 100
        description: "Column budget used when auto_wrap is enabled. Matches the line_length_limit lint default."
      grid_alignment:
        type: "boolean"
        default: false
        description: >-
          Column-align ':' and '=' in contiguous struct fields, declarations, and
          multi-line parameter lists. Off by default because zig fmt left-flushes;
          Docent re-applies this pass every run when enabled.

  complexity:
    type: "object"
    description: "Threshold-based complexity rules."
    additionalProperties: false
    properties:
      scan_mode:
        $ref: "#/definitions/scan_mode"
        description: "Whether to enforce complexity rules on all declarations or public only. Default: all."
        default: "all"
      cognitive_complexity:
        $ref: "#/definitions/rule_threshold"
        description: "Functions should stay below the cognitive complexity threshold."
      cyclomatic_complexity:
        $ref: "#/definitions/rule_threshold"
        description: "Functions should stay below the cyclomatic complexity threshold."
      max_function_parameters:
        $ref: "#/definitions/rule_threshold"
        description: "Functions should not exceed the parameter count threshold."

definitions:
  inline_suppression:
    description: >-
      Suppress diagnostics in Zig source with // line-comment pragmas. These are
      not docent.toml settings. Never use /// or //! — those strings are rendered
      as documentation. Replace `<rule>` with one or more rule_id values
      (comma-separated), or omit `<rule>` / use `*` to suppress every active rule
      on the matched span. `docent:disable` is a synonym for `docent:ignore`
      (including `-next`, `-start`, and `-end` variants). Diagnostics emitted at
      forbid severity are never suppressed.

      Forms:
      - `// docent:ignore <rule>` — same line as the comment
      - `// docent:ignore-next <rule>` — following source line
      - `// docent:ignore-start <rule>` … `// docent:ignore-end` — inclusive line
        block; an unclosed `-start` extends to EOF

  severity:
    type: "string"
    enum: ["allow", "warn", "deny", "forbid"]
    description: >-
      Effective severity level of a rule. forbid cannot be suppressed by inline
      docent:ignore or docent:disable pragmas.

  rule_id:
    type: "string"
    description: >-
      Rule name for inline suppression pragmas (see #/definitions/inline_suppression).
      Example: `// docent:ignore missing_doc_comment`.
    enum:
      - missing_doc_comment
      - blank_doc_comment
      - trailing_blank_doc_comment
      - missing_summary_terminal_punctuation
      - missing_doctest
      - private_doctest
      - doctest_naming_mismatch
      - invalid_leading_phrase
      - redundant_doc_comment
      - identifier_case
      - line_length_limit
      - cognitive_complexity
      - cyclomatic_complexity
      - max_fun_params

  case_convention:
    type: "string"
    description: "Expected identifier or module-filename casing."
    enum: ["snake_case", "camelCase", "PascalCase", "kebab-case", '@"kebab-case"']

  scan_mode:
    type: "string"
    enum: ["public", "all"]
    description: "public = only publicly visible declarations; all = includes private and internal declarations."

  # --- Rule base shapes ---

  rule_simple:
    description: "A rule with severity and an optional per-rule scan_mode override."
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."

  rule_threshold:
    description: "A rule with a numeric threshold and optional per-rule scan_mode override. Shared by cognitive_complexity, cyclomatic_complexity, and max_function_parameters."
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          threshold:
            type: "integer"
            minimum: 1
            description: "Maximum value before the rule triggers."

  # --- Rule-specific shapes ---

  rule_missing_doc_comment:
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          check_parameters:
            type: "boolean"
            default: false
            description: "Also enforce documentation on function parameters."
          check_errors:
            type: "boolean"
            default: true
            description: "Also enforce documentation on individual error set members."

  rule_missing_summary_terminal_punctuation:
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          scope:
            type: "string"
            enum: ["summary", "all"]
            default: "summary"
            description: "Check only the first paragraph (summary) or all paragraphs."
          accepted_marks:
            type: "array"
            items:
              type: "string"
              maxLength: 1
            default: [".", "!", "?"]
            description: "Punctuation characters accepted as terminal marks."

  rule_invalid_leading_phrase:
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          require_kind:
            type: "boolean"
            default: false
            description: "Require a kind word matching the identifier's kind."
          require_article:
            type: "boolean"
            default: false
            description: "Require an English article (a, an, the) before the identifier name."
          require_backticks:
            type: "boolean"
            default: false
            description: "Require the identifier to be wrapped in backticks."

  rule_identifier_case:
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          namespaces:
            $ref: "#/definitions/case_convention"
            default: "snake_case"
          functions:
            $ref: "#/definitions/case_convention"
            default: "camelCase"
          types:
            $ref: "#/definitions/case_convention"
            default: "PascalCase"
            description: "Structs, enums, unions, error sets."
          constants:
            $ref: "#/definitions/case_convention"
            default: "snake_case"
            description: "Global constants and comptime values."
          struct_file_case:
            $ref: "#/definitions/case_convention"
            default: "PascalCase"
            description: >-
              Case convention for struct-at-file-scope module filenames. Defaults
              to PascalCase, matching struct type names. Use snake_case for Tiger
              Style; kebab-case or @"kebab-case" for hyphenated stems.

  rule_line_length_limit:
    oneOf:
      - $ref: "#/definitions/severity"
      - type: "object"
        additionalProperties: false
        required: ["level"]
        properties:
          level:
            $ref: "#/definitions/severity"
          scan_mode:
            $ref: "#/definitions/scan_mode"
            description: "Override the category scan_mode for this rule only. Inherits the category default when omitted."
          max_length:
            type: "integer"
            minimum: 1
            default: 100
            description: "Maximum character column width per line."
          ignore_trailing_comments:
            type: "boolean"
            default: false
            description: "Exclude trailing inline `//` comments from the measured line width."
          ignore_leading_comments:
            type: "boolean"
            default: false
            description: "Exclude lines that are only leading whitespace plus `//`, `///`, or `//!`."
